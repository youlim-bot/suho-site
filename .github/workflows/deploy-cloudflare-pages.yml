name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p /tmp/suho-site-pages
          cp index.html /tmp/suho-site-pages/index.html
          cp -R assets /tmp/suho-site-pages/assets
          cp -R recruit /tmp/suho-site-pages/recruit
          cp -R news /tmp/suho-site-pages/news
          cp -R history /tmp/suho-site-pages/history
          cp -R admin /tmp/suho-site-pages/admin

      - name: Deploy News API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e3c3fecc26006293f0130c4a5967b62d
          command: deploy --config wrangler.news-api.jsonc

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e3c3fecc26006293f0130c4a5967b62d
          command: pages deploy /tmp/suho-site-pages --project-name=suho-site --branch=main
