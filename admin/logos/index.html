<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ロゴ電光板管理 | SUHO Japan</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --void: #05070a;
      --ink: #e8edf0;
      --muted: #aeb9bf;
      --faint: #75858e;
      --cyan: #00d2ff;
      --green: #4ade80;
      --danger: #ff6b6b;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(133, 147, 153, 0.24);
      --radius: 8px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(0, 210, 255, 0.13), transparent 24rem),
        radial-gradient(circle at 84% 22%, rgba(145, 39, 255, 0.12), transparent 28rem),
        var(--void);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }
    .container { width: min(100% - 40px, 1180px); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(5,7,10,.82);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand { display: inline-flex; align-items: center; width: 150px; min-height: 44px; }
    .brand-logo { width: 150px; height: 44px; object-fit: contain; }
    .admin-badge {
      padding: 6px 10px;
      border: 1px solid rgba(0,210,255,.24);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(0,210,255,.08);
      font-size: 12px;
      font-weight: 900;
    }
    main { padding: 54px 0 90px; }
    h1 { margin: 0 0 12px; font-size: 38px; line-height: 1.2; }
    .lead { margin: 0 0 30px; color: var(--muted); }
    .panel {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .login { max-width: 520px; margin: 58px auto 0; padding: 30px; }
    .grid {
      display: grid;
      grid-template-columns: .92fr 1.08fr;
      gap: 22px;
      align-items: start;
    }
    .form { padding: 24px; position: sticky; top: 94px; }
    .list { padding: 18px; }
    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    input {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(133,147,153,.25);
      border-radius: var(--radius);
      outline: none;
      background: rgba(5,7,10,.46);
      color: var(--ink);
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,210,255,.14);
    }
    input[type="range"] { padding: 0; accent-color: var(--cyan); }
    .field { margin-bottom: 16px; }
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .preview-board {
      display: grid;
      place-items: center;
      min-height: 148px;
      margin-bottom: 16px;
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }
    .logo-frame {
      width: 160px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px dashed rgba(0,0,0,.16);
      background: #fff;
    }
    .logo-frame img {
      height: 44px;
      width: auto;
      max-width: 260px;
      object-fit: contain;
      transform-origin: center;
    }
    .help { margin: -6px 0 16px; color: var(--faint); font-size: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
    }
    .btn-primary { background: var(--cyan); color: #001e27; }
    .btn-ghost { border-color: rgba(0,210,255,.34); color: var(--cyan); background: rgba(0,210,255,.04); }
    .btn-danger { border-color: rgba(255,107,107,.38); color: var(--danger); background: rgba(255,107,107,.06); }
    .message { min-height: 22px; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .message.ok { color: var(--green); }
    .message.error { color: var(--danger); }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 6px 6px 18px;
    }
    .toolbar h2 { margin: 0; font-size: 20px; }
    .logo-item {
      padding: 18px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      background: rgba(5,7,10,.34);
    }
    .logo-item + .logo-item { margin-top: 12px; }
    .logo-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }
    .logo-title { font-weight: 900; }
    .logo-meta { color: var(--faint); font-size: 12px; font-weight: 800; }
    .mini-preview {
      display: grid;
      place-items: center;
      min-height: 88px;
      margin-bottom: 14px;
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .form { position: static; }
    }
    @media (max-width: 580px) {
      .container { width: min(100% - 28px, 1180px); }
      .row { grid-template-columns: 1fr; }
      .topbar-inner { height: 66px; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../../index.html#top"><img class="brand-logo" src="../../assets/suho-logo-white.png" alt="SUHO Japan" /></a>
      <span class="admin-badge">Logo Marquee Admin</span>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="loginPanel" class="panel login">
        <h1>ロゴ電光板管理</h1>
        <p class="lead">管理者パスワードでログインしてください。</p>
        <form id="loginForm">
          <div class="field">
            <label for="password">管理者パスワード</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary" type="submit">ログイン</button>
          <div id="loginMessage" class="message"></div>
        </form>
      </section>

      <section id="adminPanel" class="hidden">
        <h1>ロゴ電光板管理</h1>
        <p class="lead">ロゴを登録、編集、削除できます。余白が大きい画像は拡大率と位置を調整してください。</p>
        <div class="grid">
          <form id="logoForm" class="panel form">
            <input id="logoId" type="hidden" />
            <div class="field">
              <label for="title">ロゴ名</label>
              <input id="title" required />
            </div>
            <div class="field">
              <label for="imageFile">ロゴ画像</label>
              <input id="imageFile" type="file" accept="image/*" />
              <input id="src" type="hidden" />
            </div>
            <div class="preview-board">
              <div class="logo-frame" id="previewFrame">
                <img id="previewImage" alt="" />
              </div>
            </div>
            <p class="help">表示したい部分が中央に来るように、拡大率と位置を調整してください。</p>
            <div class="row">
              <div class="field">
                <label for="width">表示幅</label>
                <input id="width" type="range" min="80" max="260" step="1" value="160" />
              </div>
              <div class="field">
                <label for="scale">拡大率</label>
                <input id="scale" type="range" min="0.5" max="4" step="0.05" value="1" />
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="x">左右位置</label>
                <input id="x" type="range" min="-100" max="100" step="1" value="0" />
              </div>
              <div class="field">
                <label for="y">上下位置</label>
                <input id="y" type="range" min="-100" max="100" step="1" value="0" />
              </div>
            </div>
            <div class="actions">
              <button class="btn btn-primary" type="submit">保存する</button>
              <button class="btn btn-ghost" type="button" id="newButton">新規作成</button>
              <button class="btn btn-ghost" type="button" id="logoutButton">ログアウト</button>
            </div>
            <div id="formMessage" class="message"></div>
          </form>

          <div class="panel list">
            <div class="toolbar">
              <h2>ロゴ一覧</h2>
              <button class="btn btn-ghost" type="button" id="refreshButton">再読み込み</button>
            </div>
            <div id="logoList"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_URL = localStorage.getItem("suho_news_api_url") || "https://suho-site-news-api.biz-e3c.workers.dev";
    const tokenKey = "suho_news_admin_token";
    let logos = [];

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const logoForm = document.getElementById("logoForm");
    const formMessage = document.getElementById("formMessage");
    const logoList = document.getElementById("logoList");
    const imageFile = document.getElementById("imageFile");
    const previewFrame = document.getElementById("previewFrame");
    const previewImage = document.getElementById("previewImage");

    ["width", "scale", "x", "y"].forEach((id) => {
      document.getElementById(id).addEventListener("input", updatePreview);
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage(loginMessage, "ログイン中...");
      try {
        const result = await api("/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        }, false);
        sessionStorage.setItem(tokenKey, result.token);
        setMessage(loginMessage, "ログインしました。", "ok");
        await showAdmin();
      } catch (error) {
        setMessage(loginMessage, "ログインに失敗しました。", "error");
      }
    });

    logoForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const logo = readForm();
      try {
        const id = document.getElementById("logoId").value;
        const result = await api(id ? `/logos/${encodeURIComponent(id)}` : "/logos", {
          method: id ? "PUT" : "POST",
          body: JSON.stringify(logo)
        });
        logos = result.logos;
        clearForm();
        renderList();
        setMessage(formMessage, "保存しました。", "ok");
      } catch (error) {
        setMessage(formMessage, error.message || "保存に失敗しました。", "error");
      }
    });

    imageFile.addEventListener("change", async () => {
      const file = imageFile.files?.[0];
      if (!file) return;
      try {
        setMessage(formMessage, "画像を処理中です...");
        const resized = await resizeImage(file);
        document.getElementById("src").value = resized;
        if (!document.getElementById("title").value) {
          document.getElementById("title").value = file.name.replace(/\.[^.]+$/, "");
        }
        updatePreview();
        setMessage(formMessage, "画像を設定しました。", "ok");
      } catch (error) {
        imageFile.value = "";
        setMessage(formMessage, error.message || "画像の読み込みに失敗しました。", "error");
      }
    });

    document.getElementById("newButton").addEventListener("click", clearForm);
    document.getElementById("refreshButton").addEventListener("click", loadLogos);
    document.getElementById("logoutButton").addEventListener("click", () => {
      sessionStorage.removeItem(tokenKey);
      adminPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    });

    async function showAdmin() {
      loginPanel.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      await loadLogos();
    }

    async function loadLogos() {
      const result = await api("/logos", {}, false);
      logos = result.logos || [];
      renderList();
    }

    function renderList() {
      logoList.innerHTML = logos.map((logo) => `
        <article class="logo-item">
          <div class="logo-head">
            <div class="logo-title">${escapeHtml(logo.title)}</div>
            <div class="logo-meta">幅 ${escapeHtml(logo.width)} / 拡大 ${escapeHtml(logo.scale)}</div>
          </div>
          <div class="mini-preview">${renderLogoFrame(logo)}</div>
          <div class="actions">
            <button class="btn btn-ghost" type="button" data-edit="${escapeAttribute(logo.id)}">編集</button>
            <button class="btn btn-danger" type="button" data-delete="${escapeAttribute(logo.id)}">削除</button>
          </div>
        </article>
      `).join("");

      logoList.querySelectorAll("[data-edit]").forEach((button) => {
        button.addEventListener("click", () => editLogo(button.dataset.edit));
      });
      logoList.querySelectorAll("[data-delete]").forEach((button) => {
        button.addEventListener("click", () => deleteLogo(button.dataset.delete));
      });
    }

    function editLogo(id) {
      const logo = logos.find((item) => item.id === id);
      if (!logo) return;
      document.getElementById("logoId").value = logo.id;
      document.getElementById("title").value = logo.title;
      document.getElementById("src").value = logo.src;
      document.getElementById("width").value = logo.width || 160;
      document.getElementById("scale").value = logo.scale || 1;
      document.getElementById("x").value = logo.x || 0;
      document.getElementById("y").value = logo.y || 0;
      imageFile.value = "";
      updatePreview();
      setMessage(formMessage, "編集中です。", "ok");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteLogo(id) {
      if (!confirm("このロゴを削除しますか？")) return;
      const result = await api(`/logos/${encodeURIComponent(id)}`, { method: "DELETE" });
      logos = result.logos;
      renderList();
      setMessage(formMessage, "削除しました。", "ok");
    }

    function readForm() {
      return {
        id: document.getElementById("logoId").value,
        title: document.getElementById("title").value,
        src: document.getElementById("src").value,
        width: Number(document.getElementById("width").value),
        scale: Number(document.getElementById("scale").value),
        x: Number(document.getElementById("x").value),
        y: Number(document.getElementById("y").value)
      };
    }

    function clearForm() {
      logoForm.reset();
      document.getElementById("logoId").value = "";
      document.getElementById("src").value = "";
      imageFile.value = "";
      updatePreview();
      setMessage(formMessage, "");
    }

    function updatePreview() {
      const logo = readForm();
      previewFrame.style.width = `${clamp(logo.width || 160, 80, 260)}px`;
      previewImage.src = previewSrc(logo.src);
      previewImage.style.transform = `translate(${clamp(logo.x || 0, -100, 100)}px, ${clamp(logo.y || 0, -100, 100)}px) scale(${clamp(logo.scale || 1, 0.5, 4)})`;
    }

    function renderLogoFrame(logo) {
      const width = clamp(Number(logo.width) || 160, 80, 260);
      const scale = clamp(Number(logo.scale) || 1, 0.5, 4);
      const x = clamp(Number(logo.x) || 0, -100, 100);
      const y = clamp(Number(logo.y) || 0, -100, 100);
      return `
        <div class="logo-frame" style="width:${width}px">
          <img src="${escapeAttribute(previewSrc(logo.src))}" alt="" style="transform: translate(${x}px, ${y}px) scale(${scale})" />
        </div>
      `;
    }

    function resizeImage(file) {
      if (!file.type.startsWith("image/")) return Promise.reject(new Error("画像ファイルを選択してください。"));
      if (file.size > 8 * 1024 * 1024) return Promise.reject(new Error("画像は8MB以下にしてください。"));
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("画像を読み込めませんでした。"));
        reader.onload = () => {
          const image = new Image();
          image.onerror = () => reject(new Error("画像を読み込めませんでした。"));
          image.onload = () => {
            const maxSize = 900;
            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
            const width = Math.max(1, Math.round(image.width * scale));
            const height = Math.max(1, Math.round(image.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext("2d");
            context.drawImage(image, 0, 0, width, height);
            resolve(canvas.toDataURL("image/png"));
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function api(path, options = {}, authorized = true) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (authorized) headers.Authorization = `Bearer ${sessionStorage.getItem(tokenKey) || ""}`;
      const response = await fetch(`${API_URL}${path}`, { ...options, headers });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.error || "Request failed");
      return body;
    }

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function previewSrc(src) {
      if (!src) return "";
      return src.startsWith("assets/") ? `../../${src}` : src;
    }

    updatePreview();
    if (sessionStorage.getItem(tokenKey)) showAdmin();
  </script>
</body>
</html>
