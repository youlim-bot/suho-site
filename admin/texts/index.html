<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サイト文言管理 | SUHO</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --void: #05070a;
      --ink: #e8edf0;
      --muted: #aeb9bf;
      --faint: #75858e;
      --cyan: #00d2ff;
      --green: #4ade80;
      --danger: #ff6b6b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(133, 147, 153, 0.24);
      --radius: 8px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(0, 210, 255, 0.13), transparent 24rem),
        radial-gradient(circle at 84% 22%, rgba(145, 39, 255, 0.12), transparent 28rem),
        var(--void);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    .container { width: min(100% - 40px, 1280px); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(5,7,10,.86);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 10px 0;
    }
    .brand { display: inline-flex; align-items: center; width: 150px; min-height: 44px; }
    .brand-logo { width: 150px; height: 44px; object-fit: contain; }
    .admin-badge {
      padding: 6px 10px;
      border: 1px solid rgba(0,210,255,.24);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(0,210,255,.08);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    main { padding: 34px 0 70px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 3vw, 42px); line-height: 1.2; }
    .lead { margin: 0; color: var(--muted); }
    .panel {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .login { max-width: 520px; margin: 58px auto 0; padding: 30px; }
    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    input {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(133,147,153,.25);
      border-radius: var(--radius);
      outline: none;
      background: rgba(5,7,10,.46);
      color: var(--ink);
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,210,255,.14);
    }
    .field { margin-bottom: 16px; }
    .editor-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }
    .toolbar {
      position: sticky;
      top: 72px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      background: rgba(7, 11, 18, 0.92);
      backdrop-filter: blur(18px);
    }
    .toolbar-info {
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar-info strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
    }
    .btn-primary { background: var(--cyan); color: #001e27; }
    .btn-ghost { border-color: rgba(0,210,255,.34); color: var(--cyan); background: rgba(0,210,255,.04); }
    .btn[disabled] { cursor: progress; opacity: .7; }
    .message { min-height: 22px; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .toolbar .message { min-height: auto; margin: 0; }
    .message.ok { color: var(--green); }
    .message.error { color: var(--danger); }
    .preview-shell {
      overflow: hidden;
      min-height: 76vh;
      border: 1px solid rgba(0,210,255,.22);
      border-radius: var(--radius);
      background: #05070a;
      box-shadow: 0 20px 60px rgba(0,0,0,.24);
    }
    .preview-frame {
      display: block;
      width: 100%;
      height: 82vh;
      min-height: 760px;
      border: 0;
      background: #05070a;
    }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      .container { width: min(100% - 28px, 1280px); }
      .topbar-inner, .editor-head, .toolbar { align-items: stretch; flex-direction: column; }
      .actions { justify-content: stretch; }
      .btn { flex: 1 1 auto; }
      .preview-frame { height: 78vh; min-height: 640px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../../index.html#top"><img class="brand-logo" src="../../assets/suho-logo-white.png" alt="SUHO" /></a>
      <span class="admin-badge">Visual Text Admin</span>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="loginPanel" class="panel login">
        <h1>サイト文言管理</h1>
        <p class="lead">管理者パスワードでログインしてください。</p>
        <form id="loginForm">
          <div class="field">
            <label for="password">管理者パスワード</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary" type="submit">ログイン</button>
          <div id="loginMessage" class="message"></div>
        </form>
      </section>

      <section id="adminPanel" class="hidden">
        <div class="editor-head">
          <div>
            <h1>サイト文言管理</h1>
            <p class="lead">公開ページと同じ見た目で、青い点線のテキストをクリックして直接編集できます。</p>
          </div>
        </div>

        <div class="toolbar">
          <div class="toolbar-info">
            <strong>編集方法</strong>
            テキストをクリックして修正し、保存するとメインページに反映されます。
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="button" id="saveButton">保存する</button>
            <button class="btn btn-ghost" type="button" id="reloadButton">再読み込み</button>
            <button class="btn btn-ghost" type="button" id="logoutButton">ログアウト</button>
          </div>
          <div id="formMessage" class="message"></div>
        </div>

        <div class="preview-shell">
          <iframe id="previewFrame" class="preview-frame" title="サイト文言プレビュー" src="../../index.html?adminTextEditor=1"></iframe>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_URL = localStorage.getItem("suho_news_api_url") || "https://suho-site-news-api.biz-e3c.workers.dev";
    const tokenKey = "suho_news_admin_token";
    let texts = [];
    let previewReady = false;

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const formMessage = document.getElementById("formMessage");
    const previewFrame = document.getElementById("previewFrame");
    const saveButton = document.getElementById("saveButton");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage(loginMessage, "ログイン中...");
      try {
        const result = await api("/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        }, false);
        sessionStorage.setItem(tokenKey, result.token);
        setMessage(loginMessage, "ログインしました。", "ok");
        await showAdmin();
      } catch (error) {
        setMessage(loginMessage, "ログインに失敗しました。", "error");
      }
    });

    saveButton.addEventListener("click", saveTexts);
    document.getElementById("reloadButton").addEventListener("click", () => {
      previewReady = false;
      previewFrame.contentWindow.location.reload();
      loadTexts().catch(() => setMessage(formMessage, "再読み込みに失敗しました。", "error"));
    });
    document.getElementById("logoutButton").addEventListener("click", logout);
    previewFrame.addEventListener("load", setupPreviewEditor);

    async function showAdmin() {
      loginPanel.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      await loadTexts();
      setupPreviewEditor();
    }

    async function loadTexts() {
      const result = await api("/site-texts", {}, false);
      texts = result.texts || [];
      applyTextsToPreview();
      setMessage(formMessage, "読み込みました。", "ok");
    }

    async function saveTexts() {
      if (!sessionStorage.getItem(tokenKey)) {
        setMessage(formMessage, "ログインが必要です。もう一度ログインしてください。", "error");
        showLogin();
        return;
      }

      try {
        saveButton.disabled = true;
        setMessage(formMessage, "保存中...");
        const next = collectPreviewTexts();
        const result = await api("/site-texts", {
          method: "PUT",
          body: JSON.stringify({ texts: next })
        });
        texts = result.texts;
        applyTextsToPreview();
        setMessage(formMessage, "保存しました。メインページへ反映されます。", "ok");
      } catch (error) {
        if (error.status === 401 || /Unauthorized/i.test(error.message || "")) {
          sessionStorage.removeItem(tokenKey);
          setMessage(loginMessage, "認証期限が切れました。再ログインしてください。", "error");
          showLogin();
          return;
        }
        setMessage(formMessage, error.message || "保存に失敗しました。", "error");
      } finally {
        saveButton.disabled = false;
      }
    }

    function setupPreviewEditor() {
      const doc = previewFrame.contentDocument;
      if (!doc || !doc.body) return;
      previewReady = true;
      injectPreviewStyles(doc);
      doc.querySelectorAll("a, button").forEach((element) => {
        element.addEventListener("click", (event) => event.preventDefault());
      });
      doc.querySelectorAll("[data-site-text]").forEach((element) => {
        element.setAttribute("contenteditable", "true");
        element.setAttribute("spellcheck", "false");
        element.setAttribute("title", "クリックして編集");
        element.addEventListener("input", () => {
          const key = element.dataset.siteText;
          const item = texts.find((text) => text.key === key);
          if (item) item.value = normalizeText(element.innerText || element.textContent);
        });
        element.addEventListener("keydown", (event) => {
          if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
            event.preventDefault();
            saveTexts();
          }
        });
      });
      applyTextsToPreview();
    }

    function injectPreviewStyles(doc) {
      if (doc.getElementById("suhoTextEditorStyles")) return;
      const style = doc.createElement("style");
      style.id = "suhoTextEditorStyles";
      style.textContent = `
        [data-site-text] {
          outline: 1px dashed rgba(0, 210, 255, .72) !important;
          outline-offset: 5px !important;
          border-radius: 4px !important;
          cursor: text !important;
        }
        [data-site-text]:hover,
        [data-site-text]:focus {
          outline: 2px solid rgba(0, 210, 255, .95) !important;
          background: rgba(0, 210, 255, .08) !important;
        }
      `;
      doc.head.appendChild(style);
    }

    function applyTextsToPreview() {
      if (!previewReady) return;
      const doc = previewFrame.contentDocument;
      if (!doc) return;
      texts.forEach((item) => {
        const element = doc.querySelector(`[data-site-text="${cssEscape(item.key)}"]`);
        if (!element) return;
        if (normalizeText(element.innerText || element.textContent) === normalizeText(item.value)) return;
        renderTextWithBreaks(doc, element, item.value);
      });
    }

    function collectPreviewTexts() {
      const doc = previewFrame.contentDocument;
      if (!doc) return texts;
      return texts.map((item) => {
        const element = doc.querySelector(`[data-site-text="${cssEscape(item.key)}"]`);
        return {
          ...item,
          value: element ? normalizeText(element.innerText || element.textContent) : item.value
        };
      });
    }

    async function api(path, options = {}, auth = true) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (auth) headers.Authorization = `Bearer ${sessionStorage.getItem(tokenKey) || ""}`;
      const response = await fetch(`${API_URL}${path}`, { ...options, headers });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        const error = new Error(body.error || "Request failed");
        error.status = response.status;
        throw error;
      }
      return body;
    }

    function renderTextWithBreaks(doc, element, value) {
      const parts = String(value || "").split("\n");
      element.replaceChildren();
      parts.forEach((part, index) => {
        if (index) element.appendChild(doc.createElement("br"));
        element.appendChild(doc.createTextNode(part));
      });
    }

    function showLogin() {
      adminPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    }

    function logout() {
      sessionStorage.removeItem(tokenKey);
      showLogin();
    }

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function cssEscape(value) {
      if (window.CSS?.escape) return window.CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    function normalizeText(value) {
      return String(value || "").replace(/\r\n/g, "\n").replace(/[ \t]+\n/g, "\n").trim();
    }

    if (sessionStorage.getItem(tokenKey)) showAdmin();
  </script>
</body>
</html>
