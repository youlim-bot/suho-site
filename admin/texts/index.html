<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サイト文言管理 | SUHO</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --void: #05070a;
      --ink: #e8edf0;
      --muted: #aeb9bf;
      --faint: #75858e;
      --cyan: #00d2ff;
      --green: #4ade80;
      --danger: #ff6b6b;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(133, 147, 153, 0.24);
      --radius: 8px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(0, 210, 255, 0.13), transparent 24rem),
        radial-gradient(circle at 84% 22%, rgba(145, 39, 255, 0.12), transparent 28rem),
        var(--void);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }
    .container { width: min(100% - 40px, 1180px); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(5,7,10,.82);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand { display: inline-flex; align-items: center; width: 150px; min-height: 44px; }
    .brand-logo { width: 150px; height: 44px; object-fit: contain; }
    .admin-badge {
      padding: 6px 10px;
      border: 1px solid rgba(0,210,255,.24);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(0,210,255,.08);
      font-size: 12px;
      font-weight: 900;
    }
    main { padding: 54px 0 90px; }
    h1 { margin: 0 0 12px; font-size: 38px; line-height: 1.2; }
    .lead { margin: 0 0 30px; color: var(--muted); }
    .panel {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .login { max-width: 520px; margin: 58px auto 0; padding: 30px; }
    .editor { padding: 22px; }
    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    input, textarea {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(133,147,153,.25);
      border-radius: var(--radius);
      outline: none;
      background: rgba(5,7,10,.46);
      color: var(--ink);
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,210,255,.14);
    }
    .field { margin-bottom: 16px; }
    .text-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .text-item {
      padding: 16px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      background: rgba(5,7,10,.34);
    }
    .text-key {
      margin-bottom: 10px;
      color: var(--faint);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    .actions {
      position: sticky;
      bottom: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      padding: 16px 0 0;
      background: linear-gradient(180deg, transparent, rgba(5,7,10,.92) 30%);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
    }
    .btn-primary { background: var(--cyan); color: #001e27; }
    .btn-ghost { border-color: rgba(0,210,255,.34); color: var(--cyan); background: rgba(0,210,255,.04); }
    .message { min-height: 22px; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .message.ok { color: var(--green); }
    .message.error { color: var(--danger); }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      .container { width: min(100% - 28px, 1180px); }
      .text-grid { grid-template-columns: 1fr; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../../index.html#top"><img class="brand-logo" src="../../assets/suho-logo-white.png" alt="SUHO" /></a>
      <span class="admin-badge">Site Text Admin</span>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="loginPanel" class="panel login">
        <h1>サイト文言管理</h1>
        <p class="lead">管理者パスワードでログインしてください。</p>
        <form id="loginForm">
          <div class="field">
            <label for="password">管理者パスワード</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary" type="submit">ログイン</button>
          <div id="loginMessage" class="message"></div>
        </form>
      </section>

      <section id="adminPanel" class="hidden">
        <h1>サイト文言管理</h1>
        <p class="lead">メインページの主要テキストを編集できます。改行はそのまま公開ページに反映されます。</p>
        <form id="textsForm" class="panel editor">
          <div id="textsGrid" class="text-grid"></div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">保存する</button>
            <button class="btn btn-ghost" type="button" id="reloadButton">再読み込み</button>
            <button class="btn btn-ghost" type="button" id="logoutButton">ログアウト</button>
          </div>
          <div id="formMessage" class="message"></div>
        </form>
      </section>
    </div>
  </main>

  <script>
    const API_URL = localStorage.getItem("suho_news_api_url") || "https://suho-site-news-api.biz-e3c.workers.dev";
    const tokenKey = "suho_news_admin_token";
    let texts = [];

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const textsForm = document.getElementById("textsForm");
    const textsGrid = document.getElementById("textsGrid");
    const formMessage = document.getElementById("formMessage");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage(loginMessage, "ログイン中...");
      try {
        const result = await api("/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        }, false);
        sessionStorage.setItem(tokenKey, result.token);
        setMessage(loginMessage, "ログインしました。", "ok");
        await showAdmin();
      } catch (error) {
        setMessage(loginMessage, "ログインに失敗しました。", "error");
      }
    });

    textsForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const next = texts.map((item) => ({
        ...item,
        value: document.querySelector(`[data-text-key="${escapeAttribute(item.key)}"]`).value
      }));
      try {
        setMessage(formMessage, "保存中...");
        const result = await api("/site-texts", {
          method: "PUT",
          body: JSON.stringify({ texts: next })
        });
        texts = result.texts;
        renderTexts();
        setMessage(formMessage, "保存しました。公開ページへ反映されます。", "ok");
      } catch (error) {
        setMessage(formMessage, error.message || "保存に失敗しました。", "error");
      }
    });

    document.getElementById("reloadButton").addEventListener("click", loadTexts);
    document.getElementById("logoutButton").addEventListener("click", () => {
      sessionStorage.removeItem(tokenKey);
      adminPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    });

    async function showAdmin() {
      loginPanel.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      await loadTexts();
    }

    async function loadTexts() {
      const result = await api("/site-texts", {}, false);
      texts = result.texts || [];
      renderTexts();
      setMessage(formMessage, "読み込みました。", "ok");
    }

    function renderTexts() {
      textsGrid.innerHTML = texts.map((item) => `
        <div class="text-item">
          <label for="text-${escapeAttribute(item.key)}">${escapeHtml(item.label)}</label>
          <div class="text-key">${escapeHtml(item.key)}</div>
          <textarea id="text-${escapeAttribute(item.key)}" data-text-key="${escapeAttribute(item.key)}">${escapeHtml(item.value)}</textarea>
        </div>
      `).join("");
    }

    async function api(path, options = {}, auth = true) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (auth) headers.Authorization = `Bearer ${sessionStorage.getItem(tokenKey) || ""}`;
      const response = await fetch(`${API_URL}${path}`, { ...options, headers });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.error || "Request failed");
      return body;
    }

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    if (sessionStorage.getItem(tokenKey)) showAdmin();
  </script>
</body>
</html>
