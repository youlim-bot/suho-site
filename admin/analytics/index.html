<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アクセス分析 | SUHO</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png" />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --void: #05070a;
      --ink: #e8edf0;
      --muted: #aeb9bf;
      --faint: #75858e;
      --cyan: #00d2ff;
      --purple: #9127ff;
      --green: #4ade80;
      --danger: #ff6b6b;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(133, 147, 153, 0.24);
      --radius: 8px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(0, 210, 255, 0.13), transparent 24rem),
        radial-gradient(circle at 84% 22%, rgba(145, 39, 255, 0.12), transparent 28rem),
        var(--void);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
    }
    button, select, input { font: inherit; }
    .container { width: min(100% - 40px, 1180px); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(5,7,10,.82);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand { display: inline-flex; align-items: center; width: 150px; min-height: 44px; }
    .brand-logo { width: 150px; height: 44px; object-fit: contain; }
    .admin-badge {
      padding: 6px 10px;
      border: 1px solid rgba(0,210,255,.24);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(0,210,255,.08);
      font-size: 12px;
      font-weight: 900;
    }
    main { padding: 54px 0 90px; }
    h1 { margin: 0 0 12px; font-size: 38px; line-height: 1.2; }
    h2 { margin: 0; font-size: 19px; }
    .lead { margin: 0 0 30px; color: var(--muted); }
    .panel {
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .login { max-width: 520px; margin: 58px auto 0; padding: 30px; }
    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    input, select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(133,147,153,.25);
      border-radius: var(--radius);
      outline: none;
      background: rgba(5,7,10,.46);
      color: var(--ink);
    }
    .field { margin-bottom: 16px; }
    .dashboard-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }
    .controls {
      display: flex;
      align-items: end;
      gap: 10px;
      min-width: 280px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
    }
    .btn-primary { background: var(--cyan); color: #001e27; }
    .btn-ghost { border-color: rgba(0,210,255,.34); color: var(--cyan); background: rgba(0,210,255,.04); }
    .message { min-height: 22px; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .message.ok { color: var(--green); }
    .message.error { color: var(--danger); }
    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .kpi {
      padding: 20px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      background: rgba(5,7,10,.34);
    }
    .kpi b {
      display: block;
      color: var(--cyan);
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
    }
    .kpi span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.18fr .82fr;
      gap: 18px;
    }
    .card {
      padding: 20px;
      min-height: 260px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .chart {
      display: flex;
      align-items: end;
      gap: 8px;
      height: 250px;
      padding: 16px 0 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
      min-width: 0;
      height: 100%;
      gap: 8px;
    }
    .bar {
      width: 100%;
      min-height: 4px;
      border-radius: 5px 5px 0 0;
      background: linear-gradient(180deg, var(--cyan), rgba(0,210,255,.18));
      box-shadow: 0 0 18px rgba(0,210,255,.18);
    }
    .bar.visitors {
      background: linear-gradient(180deg, var(--purple), rgba(145,39,255,.18));
      box-shadow: 0 0 18px rgba(145,39,255,.18);
    }
    .bar-label {
      color: var(--faint);
      font-size: 10px;
      white-space: nowrap;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    .legend {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 99px;
      background: var(--cyan);
    }
    .legend span:last-child::before { background: var(--purple); }
    .list {
      display: grid;
      gap: 12px;
    }
    .rank-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .rank-label {
      overflow: hidden;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-value {
      color: var(--cyan);
      font-size: 13px;
      font-weight: 900;
    }
    .track {
      grid-column: 1 / -1;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
    }
    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
    }
    .empty {
      display: grid;
      min-height: 180px;
      place-items: center;
      color: var(--faint);
      text-align: center;
    }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .dashboard-head, .controls { flex-direction: column; align-items: stretch; }
      .kpis, .grid { grid-template-columns: 1fr; }
      .container { width: min(100% - 28px, 1180px); }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../../index.html#top"><img class="brand-logo" src="../../assets/suho-logo-white.png" alt="SUHO" /></a>
      <span class="admin-badge">Analytics Admin</span>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="loginPanel" class="panel login">
        <h1>アクセス分析</h1>
        <p class="lead">管理者パスワードでログインしてください。</p>
        <form id="loginForm">
          <div class="field">
            <label for="password">管理者パスワード</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary" type="submit">ログイン</button>
          <div id="loginMessage" class="message"></div>
        </form>
      </section>

      <section id="adminPanel" class="hidden">
        <div class="dashboard-head">
          <div>
            <h1>アクセス分析</h1>
            <p class="lead">サイト全体の訪問者数、ページビュー、人気ページ、流入元、訪問者動線を確認できます。</p>
          </div>
          <div class="controls">
            <div class="field">
              <label for="days">期間</label>
              <select id="days">
                <option value="7">過去7日</option>
                <option value="14">過去14日</option>
                <option value="30" selected>過去30日</option>
                <option value="90">過去90日</option>
              </select>
            </div>
            <button class="btn btn-primary" type="button" id="refreshButton">更新</button>
            <button class="btn btn-ghost" type="button" id="logoutButton">ログアウト</button>
          </div>
        </div>

        <div class="kpis">
          <div class="kpi"><b id="totalPageviews">0</b><span>ページビュー</span></div>
          <div class="kpi"><b id="totalVisitors">0</b><span>訪問者セッション</span></div>
          <div class="kpi"><b id="avgViews">0</b><span>平均PV / 訪問者</span></div>
        </div>

        <div class="grid">
          <section class="panel card">
            <div class="card-head">
              <h2>日別アクセス推移</h2>
              <div class="legend"><span>PV</span><span>訪問者</span></div>
            </div>
            <div id="dailyChart" class="chart"></div>
          </section>
          <section class="panel card">
            <div class="card-head"><h2>デバイス</h2></div>
            <div id="deviceList" class="list"></div>
          </section>
          <section class="panel card">
            <div class="card-head"><h2>人気ページ</h2></div>
            <div id="pageList" class="list"></div>
          </section>
          <section class="panel card">
            <div class="card-head"><h2>流入元</h2></div>
            <div id="referrerList" class="list"></div>
          </section>
          <section class="panel card" style="grid-column:1 / -1">
            <div class="card-head"><h2>訪問者動線</h2></div>
            <div id="flowList" class="list"></div>
          </section>
        </div>
        <div id="formMessage" class="message"></div>
      </section>
    </div>
  </main>

  <script>
    const API_URL = localStorage.getItem("suho_news_api_url") || "https://suho-site-news-api.biz-e3c.workers.dev";
    const tokenKey = "suho_news_admin_token";

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const formMessage = document.getElementById("formMessage");
    const daysSelect = document.getElementById("days");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage(loginMessage, "ログイン中...");
      try {
        const result = await api("/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        }, false);
        sessionStorage.setItem(tokenKey, result.token);
        setMessage(loginMessage, "ログインしました。", "ok");
        await showAdmin();
      } catch (error) {
        setMessage(loginMessage, "ログインに失敗しました。", "error");
      }
    });

    document.getElementById("refreshButton").addEventListener("click", loadAnalytics);
    daysSelect.addEventListener("change", loadAnalytics);
    document.getElementById("logoutButton").addEventListener("click", () => {
      sessionStorage.removeItem(tokenKey);
      adminPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    });

    async function showAdmin() {
      loginPanel.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      await loadAnalytics();
    }

    async function loadAnalytics() {
      try {
        setMessage(formMessage, "読み込み中...");
        const data = await api(`/analytics/summary?days=${encodeURIComponent(daysSelect.value)}`);
        renderAnalytics(data);
        setMessage(formMessage, `更新しました: ${new Date(data.generatedAt).toLocaleString("ja-JP")}`, "ok");
      } catch (error) {
        if (error.status === 401) {
          sessionStorage.removeItem(tokenKey);
          adminPanel.classList.add("hidden");
          loginPanel.classList.remove("hidden");
          setMessage(loginMessage, "認証期限が切れました。再ログインしてください。", "error");
          return;
        }
        setMessage(formMessage, error.message || "読み込みに失敗しました。", "error");
      }
    }

    function renderAnalytics(data) {
      document.getElementById("totalPageviews").textContent = formatNumber(data.totals?.pageviews || 0);
      document.getElementById("totalVisitors").textContent = formatNumber(data.totals?.visitors || 0);
      document.getElementById("avgViews").textContent = data.totals?.avgViewsPerVisitor || 0;
      renderDaily(data.daily || []);
      renderRank("pageList", data.pages || []);
      renderRank("referrerList", data.referrers || []);
      renderRank("flowList", data.flows || []);
      renderRank("deviceList", data.devices || []);
    }

    function renderDaily(items) {
      const chart = document.getElementById("dailyChart");
      const max = Math.max(1, ...items.map((item) => Math.max(item.pageviews || 0, item.visitors || 0)));
      chart.innerHTML = items.length ? items.map((item) => {
        const pvHeight = Math.max(2, Math.round(((item.pageviews || 0) / max) * 100));
        const visitorHeight = Math.max(2, Math.round(((item.visitors || 0) / max) * 100));
        const label = item.date.slice(5).replace("-", "/");
        return `
          <div class="bar-wrap" title="${escapeHtml(item.date)} PV:${item.pageviews || 0} 訪問者:${item.visitors || 0}">
            <div style="display:flex;align-items:end;gap:3px;width:100%;height:100%">
              <div class="bar" style="height:${pvHeight}%"></div>
              <div class="bar visitors" style="height:${visitorHeight}%"></div>
            </div>
            <span class="bar-label">${escapeHtml(label)}</span>
          </div>
        `;
      }).join("") : `<div class="empty">まだデータがありません。</div>`;
    }

    function renderRank(id, items) {
      const target = document.getElementById(id);
      const max = Math.max(1, ...items.map((item) => item.value || 0));
      target.innerHTML = items.length ? items.map((item) => `
        <div class="rank-row">
          <div class="rank-label" title="${escapeAttribute(item.label)}">${escapeHtml(item.label)}</div>
          <div class="rank-value">${formatNumber(item.value || 0)}</div>
          <div class="track"><div class="fill" style="width:${Math.max(3, Math.round(((item.value || 0) / max) * 100))}%"></div></div>
        </div>
      `).join("") : `<div class="empty">まだデータがありません。</div>`;
    }

    async function api(path, options = {}, auth = true) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (auth) headers.Authorization = `Bearer ${sessionStorage.getItem(tokenKey) || ""}`;
      const response = await fetch(`${API_URL}${path}`, { ...options, headers });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        const error = new Error(body.error || "Request failed");
        error.status = response.status;
        throw error;
      }
      return body;
    }

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("ja-JP").format(Number(value) || 0);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    if (sessionStorage.getItem(tokenKey)) showAdmin();
  </script>
</body>
</html>
